name: nutri_snap
description: "NutriSnap UI-first experience for capturing and reviewing meals."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.0.0
  hooks_riverpod: ^3.0.3
  flutter_hooks: ^0.21.2
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0
  permission_handler: ^12.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  responsive_framework: ^1.4.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.69.0
  sliver_tools: ^0.2.12
  cached_network_image: ^3.4.1
  flutter_dotenv: ^6.0.0
  uuid: ^4.5.1
  intl: ^0.20.2
  package_info_plus: 8.1.0
  connectivity_plus: 6.0.5
  smooth_page_indicator: ^1.2.0
  freezed_annotation: 2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: 2.5.7
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/illustrations/
    - assets/mock/
